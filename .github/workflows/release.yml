name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: compile ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runs-on: ubuntu-latest
            bun-target: bun-linux-x64
            suffix: rubric-linux-x64
          - target: linux-arm64
            runs-on: ubuntu-latest
            bun-target: bun-linux-arm64
            suffix: rubric-linux-arm64
          - target: darwin-x64
            runs-on: macos-latest
            bun-target: bun-darwin-x64
            suffix: rubric-darwin-x64
          - target: darwin-arm64
            runs-on: macos-latest
            bun-target: bun-darwin-arm64
            suffix: rubric-darwin-arm64
          - target: windows-x64
            runs-on: windows-latest
            bun-target: bun-windows-x64
            suffix: rubric-windows-x64.exe
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install workspace deps
        run: bun install --frozen-lockfile
      - name: compile single-file binary
        working-directory: packages/cli
        run: |
          mkdir -p dist
          bun build ./src/bin.ts --compile --target ${{ matrix.bun-target }} --outfile ./dist/${{ matrix.suffix }}
      - name: smoke-test (unix)
        if: runner.os != 'Windows'
        working-directory: packages/cli
        run: ./dist/${{ matrix.suffix }} --help | head -5
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: packages/cli/dist/${{ matrix.suffix }}
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
