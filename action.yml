name: 'rubric'
description: 'Pairwise prompt evaluation on pull requests — posts a judge verdict as a PR comment.'
author: 'rubric'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  config:
    description: 'Path to rubric.config.json (relative to repo root).'
    required: false
    default: 'rubric.config.json'
  report-url:
    description: 'URL of a hosted HTML report to link from the comment footer.'
    required: false
    default: ''
  fail-on-regress:
    description: 'Exit 2 when the candidate loses more cells than it wins.'
    required: false
    default: 'false'
  title:
    description: 'Title suffix for the PR comment (e.g. "baseline.md vs candidate.md").'
    required: false
    default: ''
  github-token:
    description: 'Token used to post the PR comment. Defaults to the workflow-provided GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  comment-marker:
    description: 'Hidden HTML marker used to upsert the same comment across runs.'
    required: false
    default: 'rubric-bot:pr-comment'
  version:
    description: 'rubric release tag to install (e.g. "v2.2.1"). Defaults to "latest", which resolves the most recent published release.'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    # Download the prebuilt single-file binary from the matching GitHub release.
    # Zero npm dependency — we never had a published package to install from,
    # and binaries are how users download rubric anyway. The Action and the
    # README now walk the same path.
    - name: Install rubric
      shell: bash
      env:
        RUBRIC_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        case "$(uname -s)-$(uname -m)" in
          Linux-x86_64)   ASSET="rubric-linux-x64" ;;
          Linux-aarch64)  ASSET="rubric-linux-arm64" ;;
          Darwin-x86_64)  ASSET="rubric-darwin-x64" ;;
          Darwin-arm64)   ASSET="rubric-darwin-arm64" ;;
          MINGW*|MSYS*|CYGWIN*) ASSET="rubric-windows-x64.exe" ;;
          *) echo "rubric: no prebuilt binary for $(uname -s)-$(uname -m)" >&2 ; exit 1 ;;
        esac

        # Resolve "latest" via the GitHub API so pinned and floating both work.
        if [ "${RUBRIC_VERSION}" = "latest" ]; then
          TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
          if [ -z "${TAG}" ]; then
            # Fallback: use the repo's releases endpoint on the action's own repo.
            TAG=$(gh api repos/${{ github.action_repository || github.repository }}/releases/latest --jq .tag_name)
          fi
        else
          TAG="${RUBRIC_VERSION}"
        fi

        echo "rubric: installing ${TAG} (${ASSET})"
        BIN="${RUNNER_TEMP}/rubric"
        gh release download "${TAG}" \
          --repo "${{ github.action_repository || github.repository }}" \
          --pattern "${ASSET}" \
          --output "${BIN}"
        chmod +x "${BIN}"
        echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
        # Print version for the build log.
        "${BIN}" --help >/dev/null 2>&1 || true
        echo "rubric: installed at ${BIN}"

    - name: Run evaluation
      shell: bash
      env:
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
      run: |
        ARGS=( "--config" "${{ inputs.config }}" "--json-out" "${{ runner.temp }}/rubric-run.json" )
        if [ "${{ inputs.fail-on-regress }}" = "true" ]; then
          ARGS+=( "--fail-on-regress" )
        fi
        rubric run "${ARGS[@]}"

    - name: Render PR comment
      shell: bash
      run: |
        ARGS=( "--from" "${{ runner.temp }}/rubric-run.json" )
        if [ -n "${{ inputs.report-url }}" ]; then
          ARGS+=( "--report-url" "${{ inputs.report-url }}" )
        fi
        if [ -n "${{ inputs.title }}" ]; then
          ARGS+=( "--title" "${{ inputs.title }}" )
        fi
        rubric comment "${ARGS[@]}" > "${{ runner.temp }}/rubric-comment.md"

    - name: Post PR comment
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        RUBRIC_COMMENT_MARKER: ${{ inputs.comment-marker }}
      # tsx is a tiny runtime; the action's PR-comment poster is a ~200-line
      # TS file that we invoke directly rather than bundling as a second
      # binary. npx pulls tsx on demand — this is the only npm dep.
      run: |
        npx --yes tsx@4 "${{ github.action_path }}/packages/action/src/bin.ts" \
          --body "${{ runner.temp }}/rubric-comment.md"
