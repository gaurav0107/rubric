# Scheduled drift-detection workflow for rubric.
#
# Runs the eval once a week against the same baseline + dataset. When the
# candidate loses more cells than it wins (`rubric run --fail-on-regress`
# exit 2), we render the PR-comment body and upsert a single GitHub issue
# per `marker` so the backlog does not fill up with duplicate drift reports.
# A closed drift issue is reopened when a new regression lands, which keeps
# the tracker accurate across runs.
#
# Framed as best-effort, not an SLA. Good enough for "did last week's model
# update quietly shift behaviour?" without paging anyone.
#
# Drop this file into `.github/workflows/` and flip the schedule to suit.

name: rubric-drift

on:
  schedule:
    # Mondays at 14:00 UTC. Tune to your release cadence.
    - cron: '0 14 * * 1'
  workflow_dispatch: {}

jobs:
  drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      # Upstream tokens. Swap or add providers to match your config.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      # Installs the release binary (no npm). Same path used by the PR-comment
      # action, so the two workflows stay in lockstep.
      - name: Install rubric
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG=$(gh release list --repo rubric/rubric --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null \
            || gh api repos/rubric/rubric/releases/latest --jq .tag_name)
          ASSET="rubric-linux-x64"
          BIN="${RUNNER_TEMP}/rubric"
          gh release download "${TAG}" --repo rubric/rubric --pattern "${ASSET}" --output "${BIN}"
          chmod +x "${BIN}"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
          echo "rubric: installed ${TAG}"

      - name: Run eval (baseline frozen)
        id: run
        run: |
          set +e
          rubric run \
            --config rubric.config.json \
            --json-out rubric-run.json \
            --fail-on-regress
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Render comment body for the issue
        if: steps.run.outputs.exit == '2'
        run: |
          rubric comment \
            --from rubric-run.json \
            --title "drift check — $(date -u +%Y-%m-%d)" \
            > drift-body.md

      # The drift poster lives in packages/action/src/bin.ts. We check out the
      # rubric repo into a side path to invoke it with tsx, rather than bundling
      # a second binary. Same pattern as the PR-comment action.
      - name: Check out rubric for the drift poster
        if: steps.run.outputs.exit == '2'
        uses: actions/checkout@v4
        with:
          repository: rubric/rubric
          path: .rubric-tools
          ref: ${{ env.RUBRIC_TOOLS_REF || 'main' }}

      - name: Upsert drift issue
        if: steps.run.outputs.exit == '2'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUBRIC_DRIFT_MARKER: rubric-bot:drift-issue
        run: |
          npx --yes tsx@4 \
            .rubric-tools/packages/action/src/bin.ts \
            --drift \
            --title "rubric drift — candidate regressed on scheduled check" \
            --labels "drift,rubric" \
            --body drift-body.md

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rubric-drift-${{ github.run_id }}
          path: |
            rubric-run.json
            drift-body.md
          if-no-files-found: ignore
          retention-days: 30
